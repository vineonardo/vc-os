app = "vc-os"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"
  NEXT_PUBLIC_APP_URL = "https://vc-os.fly.dev"
  X_STORM_SUPABASE_DISABLED = "true"
  X_STORM_DEMO_FALLBACK = "false"
  DEVANG_EMAIL = "devang@venturewolf.in"
  FREE_CREDITS_ON_SIGNUP = "10"
  MIN_CREDIT_PURCHASE = "100"
  CREDIT_PRICE_PAISE = "1000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
